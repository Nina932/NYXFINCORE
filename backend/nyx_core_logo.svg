<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <!-- Glow filters -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Honeycomb pattern for background -->
    <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse" patternTransform="translate(300 280)">
      <polygon points="30,0 60,15 60,37 30,52 0,37 0,15" fill="none" stroke="#0A1628" stroke-width="0.8" opacity="0.6"/>
    </pattern>

    <!-- Radial gradient for background -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0A1A30"/>
      <stop offset="50%" stop-color="#050E1A"/>
      <stop offset="100%" stop-color="#000510"/>
    </radialGradient>

    <!-- Radial glow behind main hex -->
    <radialGradient id="centerGlow" cx="50%" cy="43%" r="25%">
      <stop offset="0%" stop-color="#00B8FF" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#0066AA" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000510" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="700" fill="url(#bgGrad)"/>

  <!-- Honeycomb pattern overlay -->
  <rect width="600" height="700" fill="url(#hexPattern)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="290" rx="220" ry="220" fill="url(#centerGlow)"/>

  <!-- Outer wireframe hexagon (larger, thinner) -->
  <g transform="translate(300 280)">
    <!-- Outer hex wireframe -->
    <polygon points="0,-155 134,-77.5 134,77.5 0,155 -134,77.5 -134,-77.5"
             fill="none" stroke="#1E3D5A" stroke-width="1.5" opacity="0.7"/>

    <!-- Corner dots on outer hex -->
    <circle cx="0" cy="-155" r="5" fill="#2A5580" opacity="0.8"/>
    <circle cx="134" cy="-77.5" r="5" fill="#2A5580" opacity="0.8"/>
    <circle cx="134" cy="77.5" r="5" fill="#2A5580" opacity="0.8"/>
    <circle cx="0" cy="155" r="5" fill="#2A5580" opacity="0.8"/>
    <circle cx="-134" cy="77.5" r="5" fill="#2A5580" opacity="0.8"/>
    <circle cx="-134" cy="-77.5" r="5" fill="#2A5580" opacity="0.8"/>

    <!-- Connecting lines from outer to inner (wireframe edges) -->
    <line x1="0" y1="-155" x2="0" y2="-105" stroke="#1E3D5A" stroke-width="1" opacity="0.5"/>
    <line x1="134" y1="-77.5" x2="91" y2="-52.5" stroke="#1E3D5A" stroke-width="1" opacity="0.5"/>
    <line x1="134" y1="77.5" x2="91" y2="52.5" stroke="#1E3D5A" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="155" x2="0" y2="105" stroke="#1E3D5A" stroke-width="1" opacity="0.5"/>
    <line x1="-134" y1="77.5" x2="-91" y2="52.5" stroke="#1E3D5A" stroke-width="1" opacity="0.5"/>
    <line x1="-134" y1="-77.5" x2="-91" y2="-52.5" stroke="#1E3D5A" stroke-width="1" opacity="0.5"/>

    <!-- Main glowing hexagon - outer glow layer -->
    <polygon points="0,-105 91,-52.5 91,52.5 0,105 -91,52.5 -91,-52.5"
             fill="none" stroke="#00AAFF" stroke-width="12" opacity="0.15"
             filter="url(#strongGlow)"/>

    <!-- Main glowing hexagon - mid glow -->
    <polygon points="0,-105 91,-52.5 91,52.5 0,105 -91,52.5 -91,-52.5"
             fill="none" stroke="#00CCFF" stroke-width="6" opacity="0.4"
             filter="url(#innerGlow)"/>

    <!-- Main glowing hexagon - bright core stroke -->
    <polygon points="0,-105 91,-52.5 91,52.5 0,105 -91,52.5 -91,-52.5"
             fill="none" stroke="#00E5FF" stroke-width="3.5" opacity="0.95"
             filter="url(#softGlow)"/>

    <!-- Bright white center highlight -->
    <polygon points="0,-105 91,-52.5 91,52.5 0,105 -91,52.5 -91,-52.5"
             fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.3"/>

    <!-- Inner hex (smaller, subtle) -->
    <polygon points="0,-65 56,-32.5 56,32.5 0,65 -56,32.5 -56,-32.5"
             fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- NYX Core text -->
  <text x="300" y="500" text-anchor="middle" font-family="'Outfit', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="8" filter="url(#textGlow)">
    <tspan fill="#FFFFFF" opacity="0.95">NYX</tspan>
    <tspan fill="#FFFFFF" opacity="0.95" dx="12">Core</tspan>
  </text>

  <!-- Subtle tagline -->
  <text x="300" y="540" text-anchor="middle" font-family="'Outfit', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="4" fill="#64748B" opacity="0.7">
    FINANCIAL INTELLIGENCE
  </text>
</svg>
